<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <meta name="description" content="Quedas invitado a la boda de Gladys y Arturo, ¡no faltes!" />

  <!-- Open Graph (WhatsApp/Facebook) -->
  <meta property="og:title" content="Quedas invitado a la boda de Gladys y Arturo, ¡no faltes!" />
  <meta property="og:description" content="Abre la invitación para ver todos los detalles." />
  <meta property="og:type" content="website" />

  <meta property="og:url" content="https://argh888.github.io/Invit_boda_GyA/" />

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Quedas invitado a la boda de Gladys y Arturo, ¡no faltes!" />
  <meta name="twitter:description" content="Abre la invitación para ver todos los detalles." />
  <meta name="twitter:image" content="https://argh888.github.io/Invit_boda_GyA/assets/sobre.jpg" />

  <style>
    :root{
      --bg1:#fbf8ff;
      --bg2:#ffffff;

      --gold-a:#fff6cf;
      --gold-b:#ffd86a;
      --gold-c:#ffb300;
      --gold-d:#c47b00;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow:hidden;
    }

    .stage{
      height:100%;
      width:100%;
      padding:0;
      display:grid;
      place-items:stretch;
    }

    .btnArea{
      width:100vw;
      height:100vh;
      position:relative;
      cursor:pointer;
      user-select:none;
      outline:none;
      overflow:hidden;
      background:#000;
      border-radius:0;
      box-shadow:none;
    }

    .envelopeImg{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position: 50% 50%; /* centrada */
      display:block;
    }

    .sealText{
      position:absolute;
      left:51%;
      top:40%;
      transform: translate(-50%, -50%);
      text-align:center;
      pointer-events:none;

      font-family: "Brush Script MT", "Apple Chancery", "Segoe Script", "Snell Roundhand", cursive;
      font-size: clamp(34px, 5vw, 68px);
      line-height:1.02;
      letter-spacing:.6px;

      background: linear-gradient(180deg, var(--gold-a) 0%, var(--gold-b) 35%, var(--gold-c) 65%, var(--gold-d) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;

      text-shadow:
        0 2px 0 rgba(255,255,255,.12),
        0 12px 24px rgba(0,0,0,.35),
        0 0 18px rgba(255, 197, 60, .20);
    }
    .sealText .amp{
      display:block;
      font-size:.82em;
      opacity:.98;
      margin:2px 0;
    }

    .btnArea:focus-visible{
      outline: 4px solid rgba(124,92,255,.35);
      outline-offset: 6px;
    }

    @media (max-width: 480px){
      .sealText{
        left:50%;
        top:38%;
        font-size: clamp(30px, 10vw, 52px);
        letter-spacing:.3px;
      }
    }
  </style>
</head>
  

<body>
 <div class="stage">
  <div class="btnArea" id="openInvite" role="button" tabindex="0" aria-label="Abrir invitación">
    <img class="envelopeImg" src="assets/sobre.jpg" alt="Sobre con sello de cera" />

  

    <!-- Overlay animado (no cambia tu imagen) -->
    <div class="openFx" aria-hidden="true">
      <div class="flapTop"></div>
      <div class="letter"></div>
      <div class="shine"></div>
    </div>
  </div>
</div>

 <script>
async function openInvitation(){
  const audio = document.getElementById("bgMusic");

  // Intentamos reproducir AQUÍ (gesto de usuario seguro)
  try{
    audio.volume = 0.65;
    await audio.play();
    // Marcamos que ya está permitido reproducir en la siguiente página
    localStorage.setItem("musicAllowed", "1");
  }catch(e){
    console.warn("No se pudo iniciar audio en la carta:", e);
    localStorage.setItem("musicAllowed", "0");
  }

  // Vamos a la invitación
  window.location.href = "invitacion.html";
}

const el = document.getElementById("openInvite");
el.addEventListener("click", openInvitation);
el.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") openInvitation();
});
</script>
  <audio id="bgMusic" preload="auto" loop>
  <source src="audio/cancion.mp3" type="audio/mpeg">
</audio>
</body>
</html>
