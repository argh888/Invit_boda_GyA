<head>

 <title>Quedas invitado a la boda de Gladys y Arturo, ¡no faltes!</title>

  <style>
    :root{
      --bg1:#fbf8ff;
      --bg2:#ffffff;

      --gold-a:#fff6cf;
      --gold-b:#ffd86a;
      --gold-c:#ffb300;
      --gold-d:#c47b00;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow:hidden;
    }

    .stage{
      height:100%;
      width:100%;
      padding:0;
      display:grid;
      place-items:stretch;
    }

    .btnArea{
      width:100vw;
      height:100vh;
      position:relative;
      cursor:pointer;
      user-select:none;
      outline:none;
      overflow:hidden;
      background:#000;
      border-radius:0;
      box-shadow:none;
    }

    .envelopeImg{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    .sealText{
      position:absolute;
      left:51%;
      top:40%;
      transform: translate(-50%, -50%);
      text-align:center;
      pointer-events:none;

      font-family: "Brush Script MT", "Apple Chancery", "Segoe Script", "Snell Roundhand", cursive;
      font-size: clamp(34px, 5vw, 68px);
      line-height:1.02;
      letter-spacing:.6px;

      background: linear-gradient(180deg, var(--gold-a) 0%, var(--gold-b) 35%, var(--gold-c) 65%, var(--gold-d) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;

      text-shadow:
        0 2px 0 rgba(255,255,255,.12),
        0 12px 24px rgba(0,0,0,.35),
        0 0 18px rgba(255, 197, 60, .20);
    }
    .sealText .amp{
      display:block;
      font-size:.82em;
      opacity:.98;
      margin:2px 0;
    }

    .btnArea:focus-visible{
      outline: 4px solid rgba(124,92,255,.35);
      outline-offset: 6px;
    }
    /* ===== Animación abrir sobre (overlay) ===== */
.openFx{
  position:absolute;
  inset:0;
  pointer-events:none;
  perspective: 1200px;
}

/* Solapa superior */
.flapTop{
  position:absolute;
  left:8%;
  right:8%;
  top:8%;
  height:48%;
  transform-origin: 50% 0%;
  transform: rotateX(0deg);
  clip-path: polygon(0 0, 100% 0, 50% 72%);
  background:
    linear-gradient(180deg, rgba(255,255,255,.22), rgba(0,0,0,.10));
  filter: drop-shadow(0 14px 18px rgba(0,0,0,.18));
  opacity:0; /* aparece al abrir */
}

/* Carta que sale */
.letter{
  position:absolute;
  left:10%;
  right:10%;
  bottom:10%;
  height:64%;
  border-radius:14px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.92), rgba(247,242,255,.88));
  box-shadow: 0 20px 40px rgba(0,0,0,.18);
  transform: translateY(34%);
  opacity:0; /* aparece al abrir */
}

/* Brillito */
.shine{
  position:absolute;
  inset:-30%;
  background: radial-gradient(closest-side, rgba(255,255,255,.28), transparent 65%);
  transform: translateX(-20%);
  opacity:0;
}

/* Estado "opening" */
.btnArea.opening .flapTop{ opacity:1; animation: flapOpen 900ms ease forwards; }
.btnArea.opening .letter{ opacity:1; animation: letterUp 900ms cubic-bezier(.2,.9,.2,1) forwards; }
.btnArea.opening .shine{ opacity:1; animation: shineMove 900ms ease forwards; }

@keyframes flapOpen{
  0%   { transform: rotateX(0deg); }
  70%  { transform: rotateX(-105deg); }
  100% { transform: rotateX(-120deg); }
}
@keyframes letterUp{
  0%   { transform: translateY(34%); }
  70%  { transform: translateY(-10%); }
  100% { transform: translateY(-16%); }
}
@keyframes shineMove{
  0%   { transform: translateX(-18%); }
  100% { transform: translateX(18%); }
}

/* Respeta usuarios con reduce motion */
@media (prefers-reduced-motion: reduce){
  .btnArea.opening .flapTop,
  .btnArea.opening .letter,
  .btnArea.opening .shine{ animation:none; }
  .flapTop,.letter,.shine{ opacity:0; }
}
    /* ===== Mobile tweaks (carta) ===== */
@media (max-width: 480px){
  .sealText{
    left: 50%;
    top: 38%;
    font-size: clamp(30px, 10vw, 52px);
    letter-spacing: .3px;
    text-shadow:
      0 2px 0 rgba(255,255,255,.10),
      0 10px 18px rgba(0,0,0,.35);
  }

  /* Evita que se “corte” en pantallas muy altas (iPhone) */
  .envelopeImg{
    object-position: 50% 45%;
  }
}
  </style>
</head>

<body>
 <div class="stage">
  <div class="btnArea" id="openInvite" role="button" tabindex="0" aria-label="Abrir invitación">
    <img class="envelopeImg" src="assets/sobre.jpg" alt="Sobre con sello de cera" />

  

    <!-- Overlay animado (no cambia tu imagen) -->
    <div class="openFx" aria-hidden="true">
      <div class="flapTop"></div>
      <div class="letter"></div>
      <div class="shine"></div>
    </div>
  </div>
</div>

 <script>
async function openInvitation(){
  const audio = document.getElementById("bgMusic");

  // Intentamos reproducir AQUÍ (gesto de usuario seguro)
  try{
    audio.volume = 0.65;
    await audio.play();
    // Marcamos que ya está permitido reproducir en la siguiente página
    localStorage.setItem("musicAllowed", "1");
  }catch(e){
    console.warn("No se pudo iniciar audio en la carta:", e);
    localStorage.setItem("musicAllowed", "0");
  }

  // Vamos a la invitación
  window.location.href = "invitacion.html";
}

const el = document.getElementById("openInvite");
el.addEventListener("click", openInvitation);
el.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") openInvitation();
});
</script>
  <audio id="bgMusic" preload="auto" loop>
  <source src="audio/cancion.mp3" type="audio/mpeg">
</audio>
</body>
</html>
