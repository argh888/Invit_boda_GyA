<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abrir invitación</title>

  <style>
    :root{
      --bg1:#fbf8ff;
      --bg2:#ffffff;

      --gold-a:#fff6cf;
      --gold-b:#ffd86a;
      --gold-c:#ffb300;
      --gold-d:#c47b00;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      overflow:hidden;
    }

    .stage{
      height:100%;
      width:100%;
      padding:0;
      display:grid;
      place-items:stretch;
    }

    .btnArea{
      width:100vw;
      height:100vh;
      position:relative;
      cursor:pointer;
      user-select:none;
      outline:none;
      overflow:hidden;
      background:#000;
      border-radius:0;
      box-shadow:none;
    }

    .envelopeImg{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    .sealText{
      position:absolute;
      left:51%;
      top:40%;
      transform: translate(-50%, -50%);
      text-align:center;
      pointer-events:none;

      font-family: "Brush Script MT", "Apple Chancery", "Segoe Script", "Snell Roundhand", cursive;
      font-size: clamp(34px, 5vw, 68px);
      line-height:1.02;
      letter-spacing:.6px;

      background: linear-gradient(180deg, var(--gold-a) 0%, var(--gold-b) 35%, var(--gold-c) 65%, var(--gold-d) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;

      text-shadow:
        0 2px 0 rgba(255,255,255,.12),
        0 12px 24px rgba(0,0,0,.35),
        0 0 18px rgba(255, 197, 60, .20);
    }
    .sealText .amp{
      display:block;
      font-size:.82em;
      opacity:.98;
      margin:2px 0;
    }

    .btnArea:focus-visible{
      outline: 4px solid rgba(124,92,255,.35);
      outline-offset: 6px;
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="btnArea" id="openInvite" role="button" tabindex="0" aria-label="Abrir invitación">
      <!-- Cambia a assets/sobre.png si tu imagen es png -->
      <img class="envelopeImg" src="assets/sobre.jpg" alt="Sobre con sello de cera" />

      <div class="sealText" aria-hidden="true">
        Gladys
        <span class="amp">&amp;</span>
        Arturo
      </div>
    </div>
  </div>

  <script>
    function openInvitation(){
      localStorage.setItem("playMusic", "1");
      window.location.href = "invitacion.html";
    }

    const el = document.getElementById("openInvite");
    el.addEventListener("click", openInvitation);
    el.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") openInvitation();
    });
  </script>
</body>
</html>
